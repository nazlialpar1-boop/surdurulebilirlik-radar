name: daily
  on:
    push:
      branches: [main]
    workflow_dispatch:
  jobs:
    run:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - run: pip install anthropic
        - run: python scripts/fetch_updates.py
          env:
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        - run: |
            git config user.name "bot"
            git config user.email "bot@bot"
            git add data/updates.json
            git diff --staged --quiet || git commit -m "update"
            git push
