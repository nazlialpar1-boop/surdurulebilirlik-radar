name: Daily Sustainability Updates

  on:
    schedule:
      - cron: '0 6 * * *'
    workflow_dispatch:

  jobs:
    fetch-updates:
      runs-on: ubuntu-latest                                 
      permissions:
        contents: write
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Python                                 
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'                           

        - name: Install dependencies
          run: pip install anthropic
  
        - name: Fetch updates                                
          env:
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          run: python scripts/fetch_updates.py

        - name: Commit changes
          run: |
            git config user.name "radar-bot"
            git config user.email "bot@radar"
            git add data/updates.json
            git diff --staged --quiet || git commit -m "daily update $(date 
  +'%Y-%m-%d')"
            git push
