 name: Günlük Sürdürülebilirlik Güncellemeleri

  on:                                                        
    schedule:
      - cron: '0 6 * * *'  # Her gün saat 09:00 Türkiye saati (UTC+3)
    workflow_dispatch:       # Manuel çalıştırma butonu

  jobs:
    fetch-updates:
      runs-on: ubuntu-latest

      steps:
        - name: Repoyu indir
          uses: actions/checkout@v4

        - name: Python kur
          uses: actions/setup-python@v5
          with:                                              
            python-version: '3.11'

        - name: Bağımlılıkları yükle
          run: pip install anthropic

        - name: Güncellemeleri çek
          env:
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          run: python scripts/fetch_updates.py

        - name: Değişiklikleri kaydet
          run: |
            git config user.name "Sürdürülebilirlik Radar Bot"
            git config user.email "bot@surdurulebilirlik-radar"
            git add data/updates.json
            git diff --staged --quiet || git commit -m "🌱 Günlük güncelleme: 
  $(date +'%Y-%m-%d')"
            git push                 
